<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Realtime Status Map</title>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>

<style>
body{margin:0;}

#app{
  width:100vw;
  height:100dvh;
  position:relative;
}

#app:fullscreen{
  background:#fff;
}

#map{
  width:100%;
  height:100%;
  position:relative;
}


/* ===== MARKER BASE ===== */
/* ----- Status ----- */
.marker{
  border-radius:50%;
  /* transition:opacity .2s, box-shadow .2s, border .2s; */
  box-sizing:content-box;
  cursor: default;   /* ค่าเริ่มต้น = กดไม่ได้ */
}
.marker:not(.gray){
  cursor:pointer;   /* เปลี่ยนเป็นรูปมือเฉพาะตัวที่กดได้ */
}
.marker:not(.gray):hover{
  background:black !important;  /* พื้นเป็นสีดำ เวลา hover */ 
}

/* ----- WRL ----- */
.wrl-marker{
  cursor:pointer;  /* เปลี่ยนเป็นรูปมือเฉพาะตัวที่กดได้ ของ WRL*/
}
.wrl-marker:hover{
  background:black !important;  /* พื้นเป็นสีดำ เวลา hover */ 
}

/* ===== FILTERED ===== */
.gray{
  background:#ccc!important;
  border:1.5px solid #ccc!important;
  opacity:.35;
  animation:none!important;
  box-shadow:none!important;
}

/* ===== BLINK ===== */
.force-blink{animation:blink 1s infinite!important;}

/* ===== STATUS COLOR ===== */
.offline{width:6.5px;height:6.5px;background:#FF0000;border:1.5px solid #CC0000;}
.connecting{width:6.5px;height:6.5px;background:#FF9900;border:1.5px solid #CC7A00;}
.telemetry{width:6.5px;height:6.5px;background:#FFFF00;border:1.5px solid #B3B300;}
.initializing{width:6.5px;height:6.5px;background:#00FF00;border:1.5px solid #009900;}
.online{width:6.5px;height:6.5px;background:#009900;border:1.5px solid #1B5E20;}
.none{width:6.5px;height:6.5px;background:#F6F6F6;border:1.5px solid #4D4D4D;}

/* ===== BLINK BORDER ===== */
.force-blink.offline{box-shadow:0 0 6px rgba(255,0,0,.7);}
.force-blink.connecting{box-shadow:0 0 6px rgba(255,153,0,.7);}
.force-blink.telemetry{box-shadow:0 0 6px rgba(255,255,0,.7);}
.force-blink.initializing{box-shadow:0 0 6px rgba(0,255,0,.7);}
.force-blink.online{box-shadow:0 0 6px rgba(46,125,50,.7);}
.force-blink.none{box-shadow:0 0 6px rgba(0,0,0,.7);}


@keyframes blink{
  0%{opacity:1}
  50%{opacity:.2}
  100%{opacity:1}
}

/* ===== WRL BLINK ===== */
.wrl-blink{
  animation:blink 0.5s infinite;
  box-shadow:0 0 6px rgba(255,0,0,.8);
}

/* ===== PANEL GROUP (VERTICAL STACK) ===== */
.panel-group{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:25px;

  overflow:hidden;   /* กันล้น */
}

/* ===== SEARCH GROUP ===== */
.search-group{
  width:auto;
}

/* ===== PANEL WRAP (STATUS / DEVICE / ACK) ===== */
.panel-wrap{
  display:flex;
  flex-direction:column;
  flex:1;                  /* ให้กินพื้นที่ที่เหลือ */
  min-height:0;            /* สำคัญมากสำหรับ scroll */
  overflow-y:auto; 
  overflow-x:hidden;
  align-self:flex-start;   /* ไม่ให้ยืดเต็มความกว้าง  */
}

/* ===== PANEL BOX ===== */
.panel-box{}
.status-box{margin-bottom:6px;}
.device-box{margin-bottom:6px;}
.ack-box{margin-bottom:0;}

/* ===== PANEL ===== */
.panel{
  background:rgba(255,255,255,.95);
  padding:10px 14px;
  border-radius:8px;
  font-family:sans-serif;
  font-size:14px;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
  min-width:120px;
}

/* ===== ROW ===== */
.row{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
  cursor:pointer;
}
.row:last-child{margin-bottom:0;}
.active{font-weight:bold;}

/* ===== RESET ===== */
.reset{
  color:#1a73e8;
  font-weight:bold;
}

/* ===== DOT ===== */
.dot{
  width:10px;height:10px;border-radius:50%;box-sizing:border-box;
  transition: transform .15s ease, box-shadow .15s ease;
}
.dot.force-blink{
  transform: scale(1.25);
}
.dot-offline{background:#FF0000;border:1px solid #CC0000;}
.dot-connecting{background:#FF9900;border:1px solid #CC7A00;}
.dot-telemetry{background:#FFFF00;border:1px solid #B3B300;}
.dot-initializing{background:#00FF00;border:1px solid #009900;}
.dot-online{background:#009900;border:1px solid #1B5E20;}
.dot-none{background:#F6F6F6;border:1px solid #4D4D4D;}

.force-blink.dot-offline{border:1.5px solid #CC0000;box-shadow:0 0 6px rgba(255,0,0,.9);}
.force-blink.dot-connecting{border:1.5px solid #CC7A00;box-shadow:0 0 6px rgba(255,153,0,.9);}
.force-blink.dot-telemetry{border:1.5px solid #B3B300;box-shadow:0 0 6px rgba(255,255,0,.9);}
.force-blink.dot-initializing{border:1.5px solid #009900;box-shadow:0 0 6px rgba(0,255,0,.9);}
.force-blink.dot-online{border:1.5px solid #1B5E20;box-shadow:0 0 6px rgba(46,125,50,.9);}
.force-blink.dot-none{border:1.5px solid #4D4D4D;box-shadow:0 0 6px rgba(0,0,0,.9);}

/* ===== POPUP Z ===== */
.mapboxgl-popup{z-index:15!important;}

/* ===== RESET BUTTON (PRIMARY ACTION) ===== */
.reset-btn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 8px;
  border-radius:6px;
  background:#1a73e8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

.reset-btn:hover{
  background:#1558b0;
  box-shadow:0 2px 6px rgba(26,115,232,.4);
}

/* ===== SEARCH SIZE + STYLE (Override Reset) ===== */
.search-large{
  padding:6px 10px;      
  border-radius:4px;     
  font-weight: normal;   
  border: none;          
}

/* ===== CLEAR SEARCH BUTTON ===== */
#clearSearchBtn{
  margin-left:auto;
  padding:2px 8px;        
  border:none;
  border-radius:6px;
  background:#1a73e8;
  color:white;
  cursor:pointer;
  transition: all 0.2s ease;
}

#clearSearchBtn:hover{
  background:#1558b0;     
  box-shadow:0 2px 6px rgba(26,115,232,.4);
}

/* ========================= */
/*    WRL Toggle Button      */
/* ========================= */

/* กล่องควบคุมปุ่ม */
.map-control {
  position: absolute;   /* ลอย */
  top: 35px;            /* ห่างจากขอบบน */
  right: 15px;          /* ห่างจากขอบขวา */
  z-index: 1000;        /* ให้อยู่เหนือ panel อื่น */
}

/* ปุ่ม */
#btnWRL {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: all 0.2s ease;
}

/* ========
   สถานะ ON
======== */
#btnWRL:not(.off){
  color: #9900FF;
}

/* Hover ตอน ON → preview เป็น OFF */
#btnWRL:not(.off):hover{
  background: #e0e0e0;
  color: #666;
}

/* ========
   สถานะ OFF
======== */
#btnWRL.off {
  background: #e0e0e0;
  color: #666;
}

/* Hover ตอน OFF → preview เป็น ON */
#btnWRL.off:hover{
  background: white;
  color: #9900FF;
}
/* ========================= */

/* ===== LATEST UPDATE BOX ===== */
#latestUpdateBox{
  background:rgba(255,255,255,.95);
  padding:6px 10px;
  border-radius:6px;
  font-family:sans-serif;
  font-size:13px;
  margin-top:auto; 
  box-shadow:0 2px 6px rgba(0,0,0,.25);
  align-self:flex-start;
}
/* ========================= */

/* ===== TOP CENTER TITLE ===== */
#topTitle{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.75);
  backdrop-filter: blur(4px);
  padding:8px 18px;
  border-radius:8px;
  border-bottom:2px solid #1a73e8;   /* เส้นแนวยาว */
  font-family:sans-serif;
  font-size:20px;
  font-weight:bold;
  letter-spacing:0.5px;
  color:#1558b0; 
  text-align:center;

  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;

  box-shadow:0 2px 6px rgba(0,0,0,.25);
  z-index:1000;
}
/* ========================= */

/* ===== Modern Modal Alert (กล่องแจ้งเตือน) ===== */
.custom-alert{    /* ทำให้ overlay คลุมเต็มพื้นที่ */
  position:absolute;             
  inset:0;                        
  background:rgba(0,0,0,.45);   
  backdrop-filter: blur(4px);     
  display:flex;                  
  align-items:center;
  justify-content:center;
  z-index:9999;  
}
.alert-box{    /* พื้นหลังสีขาวของกล่อง */
  background:#ffffff;
  min-width:200px; 
  max-width:400px; 
  width:80%; 
  padding:24px 22px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.alert-icon{    /* ขยาย emoji ให้เด่น */
  font-size:34px;
  margin-bottom:12px;
}
.alert-title{
  font-weight:600;
  font-size:18px;
  margin-bottom:8px;
}
.alert-text{    /* ทำให้ข้อความไม่ดำสนิท ดู soft กว่า */
  font-size:14px;
  color:#555;
  margin-bottom:18px;
  line-height:1.5;
}
.alert-btn{    /* ปุ่มสีน้ำเงิน  */
  background:#2563eb;
  color:#fff;
  border:none;
  padding:8px 18px;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  transition:.2s;
}
.alert-btn:hover{    /* เวลาเอาเมาส์ชี้: สีเข้มขึ้น ดู interactive */
  background:#1d4ed8;
  transform:translateY(-1px);
}
/* ========================= */

/* ===== LEFT UI CONTAINER (NEW) ===== */
.left-ui{
  position:absolute;
  left:10px;
  top:55px;
  bottom:12px;          /* เว้นขอบล่าง */
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:999;
}

/* ===== Selected Marker (popup open) ตอนคลิกเลื่อกแล้ว ===== */
.marker-selected{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.marker-selected::before{
  content:"";
  position:absolute;
  inset:1px;         
  background:#000;
  border-radius:50%;
  pointer-events:none;
}


</style>
</head>

<body>

<div id="app">

  <!-- ===== TOP TITLE ===== -->
  <div id="topTitle">
    SCADA Communication Status Monitoring
  </div>

  <!--  กำหนดค่าเริ่มต้น จะให้ WRL : ON หรือ OFF -->  
  <div class="map-control">
    <button id="btnWRL" class="off" style="display:none">
      WRL : OFF
    </button>  
  </div>

  <div id="map"></div>


<div class="left-ui">
<!-- ------------------------------------------------------ -->
<!-- ===== PANEL GROUP (VERTICAL) ===== -->
<div class="panel-group">

  <!-- ===== SEARCH GROUP ===== -->
  <div class="search-group">

    <div class="panel-box">
      <div class="panel" style="display:flex;gap:6px;">
        <input id="searchInput" type="search"
          placeholder="🔍 Search anything..."
          style="width:160px;padding:6px;border:1px solid #ccc;border-radius:4px;">
        <button id="searchBtn" class="reset-btn search-large">
          Search
        </button>
      </div>
    </div>

    <div id="searchIndicator" class="panel-box" style="display:none;margin-top:6px;">
      <div class="panel"
        style="background:#e8f0fe;color:#1a73e8;
               display:flex;align-items:center;gap:8px;">
        <span>
          🔍 Search Mode :
          <b><span id="searchCount">0</span></b> result(s)
        </span>

        <button id="clearSearchBtn" title="Clear Search">
          ✕
        </button>
      </div>
    </div>

  </div>

  <div class="panel-wrap">

    <!-- STATUS -->
    <div class="panel-box status-box">
      <div id="counter" class="panel">
        <div class="row" data-status="TOTAL">
          <span class="reset-btn" title="Clear Status / Device / Ack / Search">
            ⟳ Reset
          </span>
          Total: <span id="c_total">0</span>
        </div>
        <hr>
        <div class="row" data-status="Offline"><span class="dot dot-offline"></span>Offline /Offscan: <span id="c_offline">0</span></div>
        <div class="row" data-status="Connecting"><span class="dot dot-connecting"></span>Connecting: <span id="c_connecting">0</span></div>
        <div class="row" data-status="Telemetry Failure"><span class="dot dot-telemetry"></span>Telemetry: <span id="c_telemetry">0</span></div>
        <div class="row" data-status="Initializing"><span class="dot dot-initializing"></span>Initializing: <span id="c_initializing">0</span></div>
        <div class="row" data-status="Online"><span class="dot dot-online"></span>Online: <span id="c_online">0</span></div>
        <div class="row" data-status="none"><span class="dot dot-none"></span>none: <span id="c_none">0</span></div>
      </div>
    </div>

    <!-- DEVICE -->
    <div class="panel-box device-box">
      <div id="device-filter" class="panel">
        <div class="row" data-device="ALL">Device ALL: <span id="d_all">0</span></div>
        <hr>
        <div class="row" data-device="DAU">DAU: <span id="d_dau">0</span></div>
        <div class="row" data-device="ROUTER">ROUTER: <span id="d_router">0</span></div>
        <div class="row" data-device="none">none: <span id="d_none">0</span></div>
      </div>
    </div>

    <!-- ACK -->
    <div class="panel-box ack-box">
      <div id="ack-filter" class="panel">
        <div class="row" data-ack="ALL">Acknowledge: <span id="a_all">0</span></div>
        <hr>
        <div class="row" data-ack="Yes">Yes: <span id="a_yes">0</span></div>
        <div class="row" data-ack="No">No: <span id="a_no">0</span></div>
        <div class="row" data-ack="none">none: <span id="a_none">0</span></div>
      </div>
    </div>

  </div>
</div>
<!-- ------------------------------------------------------ -->

<!-- ------------------------------------------------------ -->
<!-- ===== LATEST UPDATE (Bottom Left) ===== -->
<div id="latestUpdateBox">
  Update : <span id="latestUpdateText">-</span>
</div>
<!-- ------------------------------------------------------ -->

</div>


<script>
mapboxgl.accessToken='pk.eyJ1IjoicHJhc2VydC1tYXBib3giLCJhIjoiY21remZqZDdrMDEwbzNlc2E2b3htZWM2dyJ9.4BEW_l9sQlPzkMt5SyyNiQ';
//const API_URL='https://script.google.com/macros/s/AKfycbyir64PbHBtTUzileqK0TXE9eu3ib5olFfAT32p24tAnwVjCb9NThC0gBXMFYZ2yn6Y/exec';

// --- ล็อก API ---
const API_KEY="CHANGE_ME_TO_LONG_RANDOM_STRING";
const APP_NAME="REALTIME-MAP";
const API_BASE='https://script.google.com/macros/s/AKfycbyir64PbHBtTUzileqK0TXE9eu3ib5olFfAT32p24tAnwVjCb9NThC0gBXMFYZ2yn6Y/exec';

const API_URL = `${API_BASE}?key=${encodeURIComponent(API_KEY)}&app=${encodeURIComponent(APP_NAME)}`;
const API_WRL = `${API_URL}&layer=wrl`;
// --------------

const VALID_STATUS=new Set(["Online","Connecting","Initializing","Offline","Telemetry Failure"]);
const VALID_DEVICE=new Set(["DAU","ROUTER"]);
const VALID_ACK=new Set(["Yes","No"]);

// normalize status ด้วย word boundary, ลดปัญหาอักขระพิเศษ และ ไม่สนตัวพิมพ์เล็ก/ใหญ่ 
const NORMALIZE_STATUS = [...VALID_STATUS].map(s => ({
  key: s,
  regex: new RegExp(
    `\\b${s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`,
    "i"
  )
}));

const map=new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/streets-v12',
  center:[100.5,17.5],
  zoom:6
});

//------------------------------------
//       ทำให้ Full screen ได้
//------------------------------------
//สร้างปุ่ม Full screen
map.addControl(
  new mapboxgl.FullscreenControl({
    container: document.getElementById('app')
  }),
  'bottom-right'
);

//กัน map เพื้ยนเวลา กดปุ่ม Fullscreen / ออกจาก Fullscreen
document.addEventListener('fullscreenchange', () => {
  map.resize();
});

//แก้ปัญหาเกี่ยวกับการหมุนจอใน iPad, iPhone, Android tablet 
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    map.resize();
  }, 300);  
});
//------------------------------------

const markers=[];
const wrlMarkers = new Map();

let wrlVisible = false;  //ตัวแปร กำหนดค่าเริ่มต้นให้ WRL >> OFF
let lastUpdateStamp=null;  //ตัวแปรเก็บ Timestamp สำหรับทำ Advanced Delta Refresh
let retried = false;  //ตัวแปรตรวจสอบว่า timestamp ได้มีการ retry Refresh ไปแล้วหรือยัง

let latestWRLData = [];  //ตัวแปรเก็บ WRL ล่าสุด
let currentPopup = null;  //ตัวแปร global ควบคุม popup
let activeMarkerElement = null;  //ตัวแปรเก็บ marker ที่ active

let savedWRLPopup = null;  //ตัวแปรเก็บ object ของ popup ของ WRL
let savedWRLMarker = null;  //ตัวแปรเก็บ element ของ WRL ที่เป็นจุดดำ

let bounds=new mapboxgl.LngLatBounds();
let activeStatuses=new Set(),activeDevice=null,activeAck=null;

// ★ ADD
let searchResultSet=null;

// -start- ★ ADD : popup permission state (allow popup only when Marker label is visible)
let searchActive=false;
let filterActive=false;
// -end-

// zIndex priority (higher = more important)
const Z_INDEX = {selected: 1000, wrl_false: 110, wrl_true: 100, hidden: 1};
const zBase={Offline:60,Connecting:70,"Telemetry Failure":50,Initializing:40,Online:10,none:30,_default:20};


//★ ฟังก์ชันดูพิกัด เต็มหน้าจอ
function fitToBounds(bounds){

  const rect = document
    .getElementById("topTitle")
    ?.getBoundingClientRect();

  const topPadding = rect ? rect.bottom + 20 : 40;

  map.fitBounds(bounds,{
    padding:{
      top: topPadding,
      bottom: 40,
      left: 40,
      right: 40
    }
  });

}

async function loadWRL(){
  try{
    const response = await fetch(API_WRL);
    const r = await response.json();

    if(!r || !r.success || !Array.isArray(r.data)){
      console.warn("WRL load failed");
      return;
    }

    //เก็บข้อมูล WRL ล่าสุดไว้
    latestWRLData = r.data;

    // ป้องกัน marker ซ้อน
    wrlMarkers.forEach(m=>m.remove());
    wrlMarkers.clear();

    r.data.forEach(p=>{

      // ตรวจ lat/lng แบบปลอดภัย
      const lat = Number(p.lat);
      const lng = Number(p.lng);
      if(!Number.isFinite(lat) || !Number.isFinite(lng)) return;

      const el = document.createElement('div');
      el.className = "wrl-marker";
      el.style.width = "6.5px";
      el.style.height = "6.5px";
      el.style.borderRadius = "50%";  //"50%" >> วงกลม

      const isFalse = String(p.status).toLowerCase() === "false";
      el.dataset.status = String(!isFalse);

      // สีพื้นของ WRL แยกชัดเจน ระหว่าง  false หรือ true
      if (isFalse) {
        el.style.backgroundColor = "rgba(153,0,255,0.45)";   // false เข้ม
        el.style.border = "2.0px solid #ff0000";
        el.style.zIndex = Z_INDEX.wrl_false;
        el.classList.add("wrl-blink");                       // กระพริบเฉพาะ false
      } else {
        el.style.backgroundColor = "rgba(153,0,255,0.15)";   // true เดิม
        el.style.border = "1.5px solid #9900ff";
        el.style.zIndex = Z_INDEX.wrl_true;
      }

      // สร้าง popup WRL
      const popup = new mapboxgl.Popup({offset: 10, closeButton: true}).setHTML(`
        <div style="font-size:13px;font-weight:600;">
          ${p.site ?? "-"}
        </div>
      `);

      // สร้าง marker + ผูก popup
      if(!p.site || !p.site.trim()){
        return;
      }
      const key = p.site.trim();

      const marker = new mapboxgl.Marker(el)
	.setLngLat([lng, lat])
        .setPopup(popup);

      marker._dataRef = {
        _passSearch: true,
        _passFilter: true
      };

      attachPopupProtection(el, marker);

      if (wrlVisible) {
        marker.addTo(map);
      }

      wrlMarkers.set(key, marker);

    });

    document.getElementById("btnWRL").style.display = "block";
	
  }catch(e){
    console.error("WRL load error:",e);
  }
}


function syncWRLStatus(newData){

  console.log("⚡ WRL SYNC >> START");

  // สร้าง Map จากข้อมูลใหม่ (key = site)
  const statusMap = new Map();

  newData.forEach(p=>{
    if(!p.site || !p.site.trim()){
      return;
    }
    const normalized = String(p.status).toLowerCase() === "true";
    statusMap.set(p.site.trim(), normalized);  
  });

  // วน marker ทั้งหมดที่เราเก็บไว้
  let updateCount=0;
  
  wrlMarkers.forEach((marker, key)=>{

    const newStatus = statusMap.get(key);

    if(newStatus === undefined){
      return;
    }

    const el = marker.getElement();
    const oldStatus = el.dataset.status;

    // ถ้า status เหมือนเดิม ไม่ต้อง update
    if(oldStatus === String(newStatus)){
      return;
    }	
	
    el.dataset.status = String(newStatus);
    el.classList.remove("wrl-blink");

    if(newStatus === false){

      //🔴 false = แดง + กระพริบ
      el.style.backgroundColor = "rgba(153,0,255,0.45)"
      el.style.border = "2.0px solid #ff0000";
      el.style.zIndex = Z_INDEX.wrl_false;

      el.classList.add("wrl-blink");

    }else{

      // 🟣 true = ม่วงอ่อน
      el.style.backgroundColor = "rgba(153,0,255,0.15)";
      el.style.border = "1.5px solid #9900ff";
      el.style.zIndex = Z_INDEX.wrl_true;
    }
	
    console.log(`${updateCount + 1}. 🔁 ${key} : ${oldStatus} ➜ ${newStatus}`);	
    updateCount++;
	
  });

  console.log("✅ WRL SYNC >> COMPLETE");
}


function toggleWRL(){
  wrlVisible = !wrlVisible;
  const btn = document.getElementById("btnWRL");

  if(wrlVisible){

    // 🟢 แสดง marker
    wrlMarkers.forEach(m => m.addTo(map));

    // 🟢 sync เมื่อตอนขณะเปิด WRL
    if(latestWRLData.length){
      syncWRLStatus(latestWRLData);
    }
    
    // 🟢 restore popup เฉพาะกรณีที่ถูกซ่อนเพราะ WRL OFF
    if(savedWRLPopup && savedWRLMarker && 
      !activeMarkerElement   // ⭐ ต้องไม่มี popup อื่นเปิดอยู่
    ){

      // ล้าง popup ปัจจุบันก่อน
      clearActivePopupAndMarker();

      // restore popup
      savedWRLPopup.addTo(map);

      // เช็ค marker ยังอยู่ >> restore marker สีดำ
      if(document.body.contains(savedWRLMarker)){
        savedWRLMarker.classList.add("marker-selected");
      }

      currentPopup = savedWRLPopup;
      activeMarkerElement = savedWRLMarker;
      
      // reset saved
      savedWRLPopup = null;
      savedWRLMarker = null;
    }

    btn.innerText = "WRL : ON";
    btn.classList.remove("off");

  }else{
    // 🔴 WRL popup ถูกซ่อน แต่จดจำข้อมูลไว้
    if(
      currentPopup &&
      activeMarkerElement &&
      activeMarkerElement.classList.contains("wrl-marker")
    ){
      savedWRLPopup = currentPopup;
      savedWRLMarker = activeMarkerElement;
  
      currentPopup.remove();
      
      // ลบ marker-selected
      activeMarkerElement.classList.remove("marker-selected");
      
      currentPopup = null;
      activeMarkerElement = null;
    }
    
    // 🔴 ซ่อน marker ทั้งหมด
    wrlMarkers.forEach(m => m.remove());

    btn.innerText = "WRL : OFF";
    btn.classList.add("off");
  }

}

function attachPopupProtection(el, marker){

  // -start- ★ ADD : block popup if not allowed by search / filter (allow popup only when Marker label is visible)
  el.addEventListener('click', e => {

    const m = marker._dataRef;
    if(!m) return;

    const allowPopup =
      (!searchActive || m._passSearch) &&
      (!filterActive || m._passFilter);

    if(!allowPopup){
      e.stopPropagation();
      e.preventDefault();
    }
  });
  // -end-

  // ✅ FIX iPad Pencil popup
  el.addEventListener('pointerup', e => {

    const m = marker._dataRef;
    if(!m) return;

    const allowPopup =
      (!searchActive || m._passSearch) &&
      (!filterActive || m._passFilter);

    if(!allowPopup){
      e.stopPropagation();
      e.preventDefault();
      return;
    }

    // ★ ลบ popup + จุดดำ
    clearActivePopupAndMarker();

    // ★ ดึง popup ของ marker นี้
    const popup = marker.getPopup();

    // ★ เปิด popup บนแผนที่
    popup.addTo(map);
    currentPopup = popup;

    // ★ ทำให้ marker นี้เป็นสีดำ
    el.classList.add("marker-selected");
    activeMarkerElement = el;
	  
    // ★ ปุ่ม X → ลบจุดดำ (แก้ bug iPad Pencil)
    popup.once("open", () => {
      const closeBtn = popup.getElement()?.querySelector(".mapboxgl-popup-close-button");

      if(!closeBtn) return;

      closeBtn.addEventListener("click", () => {
        if(activeMarkerElement === el){
          el.classList.remove("marker-selected");
          activeMarkerElement = null;
          currentPopup = null;
        }
      });  
    });	  
	  
  });
}

function byStatus(m){return activeStatuses.size===0||activeStatuses.has(m.status);}
function byDevice(m){return !activeDevice||m.device===activeDevice;}
function byAck(m){return !activeAck||m.acknowledge===activeAck;}

function toggleNoneRows(statusNone,deviceNone,ackNone){
  document.querySelector('[data-status="none"]').style.display=statusNone===0?"none":"";
  document.querySelector('[data-device="none"]').style.display=deviceNone===0?"none":"";

}

function updateCounters(){
  const base=searchResultSet ?? markers;

  const sBase=base.filter(m=>byDevice(m)&&byAck(m));
  const sNone=sBase.filter(m=>m.status==="none").length;
  c_total.textContent=sBase.length;
  c_connecting.textContent=sBase.filter(m=>m.status==="Connecting").length;
  c_offline.textContent=sBase.filter(m=>m.status==="Offline").length;
  c_telemetry.textContent=sBase.filter(m=>m.status==="Telemetry Failure").length;
  c_initializing.textContent=sBase.filter(m=>m.status==="Initializing").length;
  c_online.textContent=sBase.filter(m=>m.status==="Online").length;
  c_none.textContent=sNone;

  const dBase=base.filter(m=>byStatus(m)&&byAck(m));
  const dNone=dBase.filter(m=>m.device==="none").length;
  d_all.textContent=dBase.length;
  d_dau.textContent=dBase.filter(m=>m.device==="DAU").length;
  d_router.textContent=dBase.filter(m=>m.device==="ROUTER").length;
  d_none.textContent=dNone;

  const aBase=base.filter(m=>byStatus(m)&&byDevice(m));
  const aNone=aBase.filter(m=>m.acknowledge==="none").length;
  a_all.textContent=aBase.length;
  a_yes.textContent=aBase.filter(m=>m.acknowledge==="Yes").length;
  a_no.textContent=aBase.filter(m=>m.acknowledge==="No").length;
  a_none.textContent=aNone;

  toggleNoneRows(sNone,dNone,aNone);
}

/* ===== SEARCH ===== */
function objectToSearchString(obj){
  return Object.values(obj)
    .filter(v=>v!==null && v!==undefined && typeof v!=="object" && typeof v!=="function")
    .map(v=>String(v).toLowerCase())
    .join(" ");
}

/* ★★★ UPDATED SEARCH (Search + Status + Device + Ack) ★★★ */
function runSearch(){
  const q=searchInput.value.trim().toLowerCase();
  if(!q) return;

  // -start- ★ ADD : mark search active (allow popup only when Marker label is visible)
  searchActive=true;
  // -end-

  const searched=markers.filter(m=>objectToSearchString(m).includes(q));
  if(searched.length===0){
    showWarning("ไม่พบข้อมูลที่ค้นหา");
    searchActive=false;   //reset state
    return;
  }

  const matched=searched.filter(m=>byStatus(m)&&byDevice(m)&&byAck(m));
  if(matched.length===0){
    showWarning("พบข้อมูลจาก Search แต่ไม่พบใน Filter ของ Status / Device / Ack.");
    searchActive=false;   //reset state
    return;
  }

  // 🔎 ตรวจว่าปัจจุบัน popup marker อยู่ในผล search หรือไม่
  let keepPopup = false;

  if(activeMarkerElement){
    const markerObj = activeMarkerElement._markerRef?._dataRef;
    if(markerObj){
      keepPopup = matched.includes(markerObj);
    }
  }

  // 🔴 ถ้าไม่อยู่ในผล search ให้ปิด popup + ล้าง marker สีดำ  แต่ต้องมีข้อมูลการ search ก่อน จึงจะให้ปิด popup
  if(!keepPopup){
    clearActivePopupAndMarker();
  }

  searchResultSet=matched;
  searchIndicator.style.display="";
  searchCount.textContent=matched.length;

  markers.forEach(m=>{
    m.el.classList.add('gray');
    m.el.classList.remove('force-blink');
    m.el.style.zIndex=1;

    // -start- ★ ADD (allow popup only when Marker label is visible)
    m._passSearch=false;
    // -end-
  });

  const b=new mapboxgl.LngLatBounds();
  matched.forEach(m=>{
    m.el.classList.remove('gray');
    m.el.classList.add('force-blink');
    m.el.style.zIndex=Z_INDEX.selected;
    b.extend([m.lng,m.lat]);

    // -start- ★ ADD (allow popup only when Marker label is visible)
    m._passSearch=true;
    // -end-
  });

  updateCounters();

  matched.length===1
    ? map.flyTo({center:[matched[0].lng,matched[0].lat],zoom:12})
    : fitToBounds(b);
}

// ทำให้การ Search ได้ข้อมูลล่าสุด กรณีเมื่อ Search Mode เปิดอยู่ หลังการ Refresh Delta
function reApplySearchAfterDelta(){

  if(!searchActive) return;

  const q = searchInput.value.trim().toLowerCase();
  if(!q){
    clearSearch();
    return;
  }

  const searched = markers.filter(m =>
    objectToSearchString(m).includes(q)
  );

  const matched = searched.filter(m =>
    byStatus(m) && byDevice(m) && byAck(m)
  );

  searchResultSet = matched;
  searchCount.textContent = matched.length;

  if(matched.length === 0){
    clearSearch();
  }
}

function showWarning(msg){

  const overlay = document.createElement("div");

      <div class="alert-icon">⚠️</div>
      <div class="alert-title">Search Not Found</div>
      <div class="alert-text">${msg}</div>
      <button class="alert-btn">OK</button>
    </div>
  `;

  /* ปิดเมื่อกดปุ่ม */

  /* สำคัญ: ต้อง append เข้า #app ไม่ใช่ body */

/* ===== FILTER ===== */
function applyFilter(){

  const base = searchResultSet ?? markers;
  const baseSet = new Set(base);

  // -start- ★ ADD : filter active state (allow popup only when Marker label is visible)
  filterActive =
    activeStatuses.size>0 ||
    activeDevice!==null ||
    activeAck!==null;
  // -end-

  markers.forEach(m=>{
	const inBase = baseSet.has(m);
    const visible = inBase && byStatus(m) && byDevice(m) && byAck(m);

    // -start- ★ ADD (allow popup only when Marker label is visible)
    m._passFilter = visible;
    // -end-

    const blink = activeStatuses.size===0
      ? m.status==="Connecting"
      : activeStatuses.has(m.status);

    m.el.classList.toggle('gray', !visible);
    m.el.classList.toggle('force-blink', visible && blink);
    m.el.style.zIndex = visible ? (zBase[m.status] ?? zBase._default) : Z_INDEX.hidden;

    // ★ ADD : ถ้า marker ที่มี popup อยู่ กลายเป็นสีเทา → ลบ popup + จุดดำ
    
    if(!visible && activeMarkerElement === m.el){
      
      clearActivePopupAndMarker();
    
    }
  });

  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('force-blink'));
  (activeStatuses.size===0?["Connecting"]:[...activeStatuses]).forEach(s=>{
    const dot=document.querySelector(`[data-status="${s}"] .dot`);
    if(dot) dot.classList.add('force-blink');
  });

  updateCounters();
}

//===== Advanced Delta Refresh Engine ==== 
async function advancedDeltaRefresh(){

  try{

    const res = await fetch(API_URL);
    const r = await res.json();

    if(!r || !r.success || !Array.isArray(r.data)){
      console.warn("Delta load failed");
      return;
    }

     // เช็ค timestamp ก่อน
    if (r.latestUpdateStatus === lastUpdateStamp) {

      console.log("No data change");

      if (!retried) {
        retried = true;   //retry ไปแล้ว 1 ครั้งในรอบนี้ ห้าม retry ซ้ำอีก

        console.log("🔥 Retry triggered again.");

        setTimeout(() => {
          advancedDeltaRefresh();
        }, 15000);
      }
      return;
    }

    console.log("🔄 DAU/ROUTER DELTA REFRESH >> START");

     // อัปเดตเวลามุมล่างซ้าย
    if(r.latestUpdateStatus){
      document.getElementById("latestUpdateText").textContent =
        r.latestUpdateStatus;
    }
	
     // สร้าง newDataMap
    const newDataMap = new Map();
	
    r.data.forEach(p => {
      const key = `${p.siteId ?? "nosite"}_${p.ipAddress ?? "noip"}`;
      newDataMap.set(key, p);
    });
	
     // สร้าง oldDataMap
    const oldDataMap = new Map();
	
    markers.forEach(m => {
      oldDataMap.set(m.key, m);
    });

    let updateCount=0;

    // เพิ่มใหม่ / อัปเดต
    newDataMap.forEach((p, key) => {

      const old = oldDataMap.get(key);

      const rawStatus=p.status??"";
      const status=
        NORMALIZE_STATUS.find(o=>o.regex.test(rawStatus))?.key
        || "none";

      const device=VALID_DEVICE.has(p.device)?p.device:"none";
      const ack=VALID_ACK.has(p.acknowledge)?p.acknowledge:"none";
	  
      const lat = Number(p.lat);
      const lng = Number(p.lng);
	  
      if(!Number.isFinite(lat) || !Number.isFinite(lng)){
	console.warn("Invalid lat/lng skipped:", key);
        return;
      }
	  
      // ----- เพิ่มใหม่ -----
      if(!old){
        addMarkerFromData(p,status,device,ack);
        return;
      }
	  
      // ----- อัปเดตตำแหน่ง -----
      if(old.lat !== lat || old.lng !== lng){
        old.lat = lat;
        old.lng = lng;
        old.marker.setLngLat([lng, lat]);
      } 
	  
      // ----- อัปเดตสถานะ -----
      if(old.status!==status ||
         old.device!==device ||
         old.acknowledge!==ack){
		
	console.log(`${updateCount + 1}. 🔁 ${key} : ${old.status} ➜ ${status}`);
				 
        old.status=status;
        old.device=device;
        old.acknowledge=ack;

        const cls={
          Connecting:'connecting',
          Offline:'offline',
          "Telemetry Failure":'telemetry',
          Initializing:'initializing',
          Online:'online',
          none:'none'
        }[status];

	  old.el.classList.remove(
          "connecting",
          "offline",
          "telemetry",
          "initializing",
          "online",
          "none"
        );

        old.el.classList.add(cls);
	updateCount++;
      }

    });

    // ลบ marker ที่หายไป (พร้อมลบ popup ถ้าเปิดอยู่)
    for(let i = markers.length - 1; i >= 0; i--){

      const m = markers[i];

      if(!newDataMap.has(m.key)){

        // clear popup ถ้า marker ที่จะถูกลบ เปิด popup อยู่
        if(activeMarkerElement === m.el){
          clearActivePopupAndMarker();
        }

        m.marker.remove();

        markers.splice(i,1);
      }
    }

    reApplySearchAfterDelta();
    applyFilter();

    // ===== REBUILD BOUNDS AFTER DELTA =====
    bounds = new mapboxgl.LngLatBounds();
    markers.forEach(m=>{
      bounds.extend([m.lng, m.lat]);
    });
	
    console.log("✅ DAU/ROUTER DELTA REFRESH >> COMPLETE");
	
	
    //-------------------------------
    //       WRL DELTA REFRESH 
    //-------------------------------
    try{

      console.log("🔄 WRL DELTA REFRESH >> START");

      const wrlRes = await fetch(API_WRL + "&t=" + Date.now());
      const wrlJson = await wrlRes.json();

      if(wrlJson.success && Array.isArray(wrlJson.data)){

        // เก็บข้อมูลล่าสุดไว้เสมอ
        latestWRLData = wrlJson.data;

        // ถ้า WRL เปิดอยู่ ให้ sync ทันที
        if(wrlVisible){
          syncWRLStatus(latestWRLData);
        }
		
      }	  
      console.log("✅ WRL DELTA REFRESH >> COMPLETE");

    }catch(err){
      console.warn("WRL delta refresh error:", err);
    }

    lastUpdateStamp = r.latestUpdateStatus??null;
    retried = false;  //reset retry สำหรับ timestamp รอบใหม่ (มีข้อมูลใหม่แล้ว)

  }catch(e){
    console.error("Advanced delta error:",e);
  }
}


//===== ทำ Advanced Delta Refresh ให้ทำงานทุก 5 นาที หรือ กำหนดที่ค่าอื่นๆ =====
//-------------------------------------------
//กรณีที่ 1 : Refresh ทุก 5 นาที เริ่มตอนเปิดเครื่อง
//setInterval(advancedDeltaRefresh, 5*60*1000); 
//-------------------------------------------
//กรณีที่ 2 : Default Refresh ทุก ๆ 5 นาที แต่เริ่มที่นาทีที่ลงท้ายด้วย 2 นาที 15 วินาที
function startAlignedRefresh(intervalMin = 5, baseMinute = 2, baseSecond = 15) {  
  function scheduleNext() {

    const now = new Date();
    const currentMin = now.getMinutes();

    // คำนวณนาทีถัดไปที่ลงท้ายด้วย 2.15 หรือ 7.15
    let nextMin = Math.ceil((currentMin - baseMinute) / intervalMin) 
	              * intervalMin + baseMinute;
				  
    let nextTime = new Date(now);

    if (nextMin >= 60) {
      nextTime.setHours(now.getHours() + 1);
      nextTime.setMinutes(baseMinute);
    } else {
      nextTime.setMinutes(nextMin);
    }

    nextTime.setSeconds(baseSecond);
    nextTime.setMilliseconds(0);
	
    // กันเวลาย้อนหลัง
    if (nextTime <= now) {
      nextTime.setMinutes(nextTime.getMinutes() + intervalMin);
    }	

    const delay = nextTime - new Date();
    console.log("Next refresh at:", nextTime);

    setTimeout(async () => {
      try {
        console.log("🔥 Triggered at:", new Date());
        await advancedDeltaRefresh();
      } catch (err) {
        console.error("Refresh error:", err);
      }
      scheduleNext(); 
    }, delay);
  }

  scheduleNext();
}
// เริ่มทำงาน
startAlignedRefresh(5, 2, 15);
//-------------------------------------------

</script>
